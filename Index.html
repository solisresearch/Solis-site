.images img{
width:240px;
border-radius:12px;

</style>

<script>

</head>

  <img src="rat.png" class="rat" alt="Solis Research Lab Rat">

  width:260px;
  border-radius:12px;
  animation: float 3s ease-in-out infinite;

</html>


<!-- ===================== products.html ===================== -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Products</title>
<script>
function addToCart(name,price){
let cart=JSON.parse(localStorage.getItem('cart'))||[];
cart.push({name,price});
localStorage.setItem('cart',JSON.stringify(cart));
alert('Added to cart');
}
</script>
<style>
body{font-family:Arial;margin:0;background:white}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:40px}
.card{border:1px solid #eee;padding:20px;border-radius:10px}
button{background:#0057ff;color:white;border:none;padding:10px;border-radius:6px}
</style>
</head>
<body>
<div class="grid">
<div class="card"><h3>BPC-157</h3><p>$90</p><button onclick="addToCart('BPC-157',90)">Add</button></div>
<div class="card"><h3>TB-500</h3><p>$120</p><button onclick="addToCart('TB-500',120)">Add</button></div>
</div>
</body>
</html>


<!-- ===================== cart.html ===================== -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cart</title>
<script>
function loadCart(){
let cart=JSON.parse(localStorage.getItem('cart'))||[];
let total=0;let html='';
cart.forEach(i=>{html+=`<p>${i.name} - $${i.price}</p>`;total+=i.price});
document.getElementById('cart').innerHTML=html;
document.getElementById('total').innerText='Total: $'+total;
}
</script>
</head>
<body onload="loadCart()">
<h1>Cart</h1>
<div id="cart"></div>
<h2 id="total"></h2>
</body>
</html>
